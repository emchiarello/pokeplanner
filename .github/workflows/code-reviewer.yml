name: AI Code Reviewer
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gemini Review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Unterschiede im Code holen
          DIFF=$(git diff origin/${{ github.base_ref }}...origin/${{ github.head_ref }} | head -c 15000)
          
          # 2. Skill-Datei einlesen
          SKILLS=$(cat .agents/skills/code-reviewer/SKILL.md)

          # 3. Prompt zusammenbauen
          PROMPT="Du bist ein Code Reviewer. Halte dich strikt an diese Regeln:\n$SKILLS\n\nHier ist der Code-Diff zum Reviewen:\n$DIFF"

          # 4. Anfrage an die kostenlose Gemini API (wir nutzen jq zum Erstellen des JSON)
          RESPONSE=$(curl -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=$GEMINI_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{
              \"contents\": [{
                \"parts\":[{\"text\": $(echo "$PROMPT" | jq -aRs .)}]
              }]
            }")

          # 5. Antwort extrahieren
          REVIEW_TEXT=$(echo $RESPONSE | jq -r '.candidates[0].content.parts[0].text')

          # 6. Kommentar im PR posten
          if [ "$REVIEW_TEXT" != "null" ]; then
            gh pr comment ${{ github.event.pull_request.number }} --body "### 🤖 Kostenloser KI-Review (Gemini)
            $REVIEW_TEXT"
          else
            echo "Fehler bei der API: $RESPONSE"
            exit 1
          fi