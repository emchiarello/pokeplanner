name: AI Code Reviewer
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gemini Review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Diff holen
          DIFF=$(git diff origin/${{ github.base_ref }}...origin/${{ github.head_ref }} | head -c 15000)
          
          if [ -z "$DIFF" ]; then
            echo "Keine Änderungen gefunden."
            exit 0
          fi
          
          # 2. Skill-Datei einlesen
          SKILLS=$(cat .agents/skills/code-reviewer/SKILL.md)
          
          # 3. Prompt bauen
          PROMPT="Du bist ein Code Reviewer. Regeln: $SKILLS. Reviewe diesen Diff: $DIFF"
          
          # 4. API Call - Wir probieren den stabilsten Namen: gemini-1.5-flash (ohne -latest)
          # Und wir nutzen den v1 Endpunkt
          RESPONSE=$(curl -X POST "https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=$GEMINI_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{
              \"contents\": [{
                \"parts\":[{\"text\": $(echo "$PROMPT" | jq -aRs .)}]
              }]
            }")
          
          # 5. Antwort prüfen
          REVIEW_TEXT=$(echo $RESPONSE | jq -r '.candidates[0].content.parts[0].text // empty')
          
          # 6. Kommentar posten
          if [ -n "$REVIEW_TEXT" ] && [ "$REVIEW_TEXT" != "null" ]; then
            gh pr comment ${{ github.event.pull_request.number }} --body "### 🤖 KI Code Review
            $REVIEW_TEXT"
          else
            # Falls es wieder kracht, lassen wir uns alle verfügbaren Modelle anzeigen
            echo "API Fehler! Versuche Liste der Modelle zu laden..."
            curl -s "https://generativelanguage.googleapis.com/v1/models?key=$GEMINI_API_KEY" | jq -r '.models[].name'
            echo "Vollständiger API Log: $RESPONSE"
            exit 1
          fi